<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Lyrics Grader">
<title>✦ Lyrics Grader</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inconsolata:wght@400;600&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #07070f;
    --surface: rgba(255,255,255,0.03);
    --border: rgba(251,191,36,0.18);
    --accent: #fbbf24;
    --accent2: #92400e;
    --text: #fef9ee;
    --muted: #9a8a6a;
    --green: #34d399;
    --error: #f87171;
    --purple: #a855f7;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: 'Lora', Georgia, serif; min-height: 100vh; min-height: -webkit-fill-available; padding-bottom: env(safe-area-inset-bottom); overflow-x: hidden; }
  .orb { position: fixed; border-radius: 50%; pointer-events: none; z-index: 0; filter: blur(80px); }
  .orb1 { top: -15%; left: -15%; width: 400px; height: 400px; background: radial-gradient(circle, rgba(146,64,14,0.3) 0%, transparent 70%); }
  .orb2 { bottom: -20%; right: -15%; width: 500px; height: 500px; background: radial-gradient(circle, rgba(251,191,36,0.12) 0%, transparent 70%); }
  .container { position: relative; z-index: 1; max-width: 680px; margin: 0 auto; padding: 0 16px 80px; }
  .header { text-align: center; padding: 48px 20px 32px; border-bottom: 1px solid var(--border); }
  .header-eyebrow { font-family: 'Inconsolata', monospace; font-size: 10px; letter-spacing: 6px; color: var(--accent); text-transform: uppercase; margin-bottom: 12px; }
  .header h1 { font-family: 'Playfair Display', serif; font-size: clamp(2rem, 8vw, 3rem); font-weight: 900; line-height: 1.1; background: linear-gradient(135deg, #fef3c7, #fbbf24, #f59e0b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .header p { font-family: 'Inconsolata', monospace; font-size: 11px; letter-spacing: 3px; color: var(--muted); margin-top: 10px; text-transform: uppercase; }
  .api-section { margin-top: 28px; background: rgba(251,191,36,0.05); border: 1px solid rgba(251,191,36,0.2); border-radius: 14px; padding: 18px; }
  .api-row { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; }
  .api-row:last-of-type { margin-bottom: 0; }
  .api-label { font-family: 'Inconsolata', monospace; font-size: 10px; color: var(--muted); letter-spacing: 2px; min-width: 70px; }
  .api-input { flex: 1; background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 10px; padding: 11px 14px; color: var(--text); font-family: 'Inconsolata', monospace; font-size: 13px; outline: none; -webkit-appearance: none; }
  .api-input:focus { border-color: var(--accent); }
  .api-hint { font-family: 'Inconsolata', monospace; font-size: 10px; color: rgba(154,138,106,0.7); margin-top: 8px; letter-spacing: 1px; line-height: 1.6; }
  .api-saved { font-family: 'Inconsolata', monospace; font-size: 10px; color: var(--green); margin-top: 6px; letter-spacing: 1px; display: none; }
  .active-model { font-family: 'Inconsolata', monospace; font-size: 10px; letter-spacing: 2px; margin-top: 8px; color: var(--accent); display: none; }
  .section-label { font-family: 'Inconsolata', monospace; font-size: 10px; letter-spacing: 5px; color: var(--accent); text-transform: uppercase; margin: 24px 0 8px; }
  textarea { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; color: var(--text); font-family: 'Lora', Georgia, serif; font-size: 15px; resize: none; outline: none; -webkit-appearance: none; transition: border-color 0.2s; line-height: 1.6; }
  textarea:focus { border-color: rgba(251,191,36,0.6); }
  textarea::placeholder { color: var(--muted); font-style: italic; font-size: 13px; }
  .toggle-group { display: flex; flex-wrap: wrap; gap: 8px; }
  .toggle-btn { padding: 8px 14px; border-radius: 50px; border: 1.5px solid var(--border); background: transparent; color: var(--muted); font-family: 'Inconsolata', monospace; font-size: 12px; letter-spacing: 1px; cursor: pointer; transition: all 0.15s; -webkit-appearance: none; }
  .toggle-btn.active { border-color: var(--accent); background: rgba(251,191,36,0.12); color: #fef3c7; transform: scale(1.04); }
  .grade-btn { width: 100%; margin-top: 28px; padding: 18px; border-radius: 14px; border: none; background: linear-gradient(135deg, var(--accent2), var(--accent)); color: #1a0f00; font-family: 'Inconsolata', monospace; font-size: 14px; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; cursor: pointer; box-shadow: 0 0 30px rgba(251,191,36,0.2); transition: all 0.2s; -webkit-appearance: none; }
  .grade-btn:active { transform: scale(0.98); opacity: 0.9; }
  .grade-btn:disabled { background: rgba(251,191,36,0.2); color: var(--muted); box-shadow: none; cursor: not-allowed; }
  .action-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 14px; }
  .rewrite-btn { padding: 16px; border-radius: 14px; border: 1.5px solid rgba(52,211,153,0.3); background: rgba(52,211,153,0.08); color: var(--green); font-family: 'Inconsolata', monospace; font-size: 12px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: all 0.2s; -webkit-appearance: none; }
  .rewrite-btn:active { transform: scale(0.98); }
  .rewrite-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .regrade-btn { padding: 16px; border-radius: 14px; border: 1.5px solid rgba(251,191,36,0.3); background: rgba(251,191,36,0.08); color: var(--accent); font-family: 'Inconsolata', monospace; font-size: 12px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: all 0.2s; -webkit-appearance: none; }
  .regrade-btn:active { transform: scale(0.98); }
  .regrade-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .status { font-family: 'Inconsolata', monospace; font-size: 12px; letter-spacing: 2px; color: var(--accent); margin-top: 20px; text-align: center; padding: 14px; border: 1px solid var(--border); border-radius: 10px; background: var(--surface); display: none; }
  .status.visible { display: block; }
  .status.error { color: var(--error); border-color: rgba(248,113,113,0.3); }
  .output-box { margin-top: 24px; border-radius: 16px; padding: 22px; animation: fadeUp 0.4s ease both; }
  .grade-box { background: rgba(251,191,36,0.04); border: 1px solid rgba(251,191,36,0.25); }
  .rewrite-box { background: rgba(52,211,153,0.04); border: 1px solid rgba(52,211,153,0.25); margin-top: 16px; }
  .options-box { background: rgba(168,85,247,0.04); border: 1px solid rgba(168,85,247,0.25); margin-top: 16px; border-radius: 16px; padding: 22px; animation: fadeUp 0.4s ease both; }
  .options-title { font-family: 'Inconsolata', monospace; font-size: 10px; letter-spacing: 5px; color: var(--purple); text-transform: uppercase; margin-bottom: 6px; }
  .options-subtitle { font-family: 'Lora', Georgia, serif; font-size: 13px; color: var(--muted); font-style: italic; margin-bottom: 20px; line-height: 1.6; }
  .options-question { margin-bottom: 20px; }
  .options-question-label { font-family: 'Inconsolata', monospace; font-size: 10px; letter-spacing: 3px; color: var(--accent); text-transform: uppercase; margin-bottom: 10px; }
  .option-btn { width: 100%; text-align: left; background: rgba(0,0,0,0.2); border: 1.5px solid var(--border); border-radius: 10px; padding: 12px 16px; color: var(--muted); font-family: 'Lora', Georgia, serif; font-size: 14px; cursor: pointer; transition: all 0.15s; margin-bottom: 8px; line-height: 1.5; -webkit-appearance: none; }
  .option-btn:last-of-type { margin-bottom: 0; }
  .option-btn.selected { border-color: var(--purple); background: rgba(168,85,247,0.12); color: #f0abfc; }
  .option-btn:active { transform: scale(0.99); }
  .build-btn { width: 100%; margin-top: 16px; padding: 16px; border-radius: 14px; border: none; background: linear-gradient(135deg, #7c3aed, #a855f7); color: #fff; font-family: 'Inconsolata', monospace; font-size: 13px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; cursor: pointer; box-shadow: 0 0 20px rgba(168,85,247,0.25); transition: all 0.2s; -webkit-appearance: none; }
  .build-btn:active { transform: scale(0.98); }
  .build-btn:disabled { background: rgba(168,85,247,0.2); color: var(--muted); box-shadow: none; cursor: not-allowed; }
  .box-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .box-title { font-family: 'Inconsolata', monospace; font-size: 10px; letter-spacing: 5px; color: var(--accent); text-transform: uppercase; }
  .rewrite-box .box-title { color: var(--green); }
  .copy-btn { padding: 6px 16px; border-radius: 50px; border: 1.5px solid var(--border); background: transparent; color: var(--muted); font-family: 'Inconsolata', monospace; font-size: 11px; letter-spacing: 2px; cursor: pointer; transition: all 0.2s; -webkit-appearance: none; min-width: 64px; text-align: center; }
  .copy-btn.copied { color: #fef3c7; border-color: var(--accent); }
  .score-display { font-family: 'Playfair Display', serif; font-size: 3rem; font-weight: 900; line-height: 1; margin-bottom: 6px; }
  .score-label { font-family: 'Inconsolata', monospace; font-size: 10px; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; margin-bottom: 20px; }
  .grade-text { font-family: 'Lora', Georgia, serif; font-size: 14px; color: var(--text); line-height: 1.9; white-space: pre-wrap; }
  .lyrics-text { font-family: 'Lora', Georgia, serif; font-size: 15px; line-height: 2; color: var(--text); white-space: pre-wrap; word-break: break-word; }
  .score-bar-wrap { height: 6px; background: rgba(251,191,36,0.12); border-radius: 50px; margin-bottom: 20px; overflow: hidden; }
  .score-bar { height: 100%; border-radius: 50px; background: linear-gradient(90deg, var(--accent2), var(--accent)); transition: width 0.8s ease; }
  .iteration-badge { font-family: 'Inconsolata', monospace; font-size: 10px; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; margin-bottom: 12px; }
  .score-delta { font-family: 'Inconsolata', monospace; font-size: 11px; letter-spacing: 2px; margin-left: 8px; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
  .pulsing { animation: pulse 1.2s ease infinite; }
</style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="container">
  <div class="header">
    <div class="header-eyebrow">✦ Lyrics Grader ✦</div>
    <h1>Grade Your<br>Lyrics.</h1>
    <p>Chasing 10 · Powered by Groq + Gemini</p>
  </div>

  <div class="api-section" style="margin-top:28px">
    <div class="section-label" style="margin-top:0">API Keys</div>
    <div class="api-row">
      <div class="api-label">GROQ</div>
      <input type="password" id="api-groq" class="api-input" placeholder="gsk_...">
    </div>
    <div class="api-row">
      <div class="api-label">GEMINI</div>
      <input type="password" id="api-gemini" class="api-input" placeholder="AIza...">
    </div>
    <div class="api-hint">Groq is used first. Gemini kicks in automatically if Groq hits its limit.</div>
    <div class="api-saved" id="api-saved">✓ Keys saved</div>
    <div class="active-model" id="active-model"></div>
    <button onclick="saveKeys()" style="margin-top:12px;background:rgba(251,191,36,0.1);border:1px solid rgba(251,191,36,0.3);border-radius:10px;padding:8px 16px;color:var(--accent);font-family:'Inconsolata',monospace;font-size:11px;letter-spacing:2px;cursor:pointer;">Save Keys</button>
  </div>

  <div class="section-label">Genre</div>
  <div class="toggle-group" id="genre-group">
    <button class="toggle-btn active" data-value="Pop">Pop</button>
    <button class="toggle-btn" data-value="Hip-Hop">Hip-Hop</button>
    <button class="toggle-btn" data-value="R&B">R&amp;B</button>
    <button class="toggle-btn" data-value="Country">Country</button>
    <button class="toggle-btn" data-value="Rock">Rock</button>
    <button class="toggle-btn" data-value="EDM">EDM</button>
    <button class="toggle-btn" data-value="Soul">Soul</button>
    <button class="toggle-btn" data-value="Indie">Indie</button>
    <button class="toggle-btn" data-value="Christian Rock">✝️ Christian Rock</button>
    <button class="toggle-btn" data-value="Christian Worship">🙏 Christian Worship</button>
  </div>

  <div class="section-label">Paste Your Lyrics</div>
  <textarea id="lyrics" rows="12" placeholder="Paste any lyrics here — from the generator, from Suno, your own writing, anything..."></textarea>

  <div class="section-label">Context <span style="color:var(--muted);font-size:9px;letter-spacing:1px">(OPTIONAL)</span></div>
  <textarea id="context" rows="2" placeholder="What's the song about? Any details help the grader give better feedback..."></textarea>

  <button class="grade-btn" id="grade-btn" onclick="grade()">✦ &nbsp; Grade These Lyrics</button>
  <div class="status" id="status"></div>
  <div id="output"></div>
</div>

<script>
const GROQ_URL="https://api.groq.com/openai/v1/chat/completions";
const GROQ_MODEL="llama-3.3-70b-versatile";
const GEMINI_MODEL="gemini-2.5-flash-lite";
const TIMEOUT_MS=120000;

let state={
  lyrics:'', grade:'', genre:'', context:'',
  rewritten:'', iteration:0, lastScore:null,
  selectedOptions:{}
};

window.addEventListener('load',()=>{
  ['groq','gemini'].forEach(k=>{const v=localStorage.getItem(`key_${k}`);if(v)document.getElementById(`api-${k}`).value=v;});
  if(localStorage.getItem('key_groq')||localStorage.getItem('key_gemini')){document.getElementById('api-saved').style.display='block';}
});
function saveKeys(){
  ['groq','gemini'].forEach(k=>{const v=document.getElementById(`api-${k}`).value.trim();if(v)localStorage.setItem(`key_${k}`,v);});
  document.getElementById('api-saved').style.display='block';
}
function getKey(k){return document.getElementById(`api-${k}`).value.trim();}
document.querySelectorAll('.toggle-group').forEach(group=>{group.querySelectorAll('.toggle-btn').forEach(btn=>{btn.addEventListener('click',()=>{group.querySelectorAll('.toggle-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');});});});
function getSelected(id){return document.querySelector(`#${id} .toggle-btn.active`)?.dataset.value||'';}
function copyText(text,btn){const fallback=()=>{const ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;opacity:0;top:0;left:0';document.body.appendChild(ta);ta.focus();ta.select();try{document.execCommand('copy');btn.textContent='✓ Copied!';btn.classList.add('copied');setTimeout(()=>{btn.textContent='Copy';btn.classList.remove('copied');},2000);}catch(e){btn.textContent='Failed';}document.body.removeChild(ta);};if(navigator.clipboard&&window.isSecureContext){navigator.clipboard.writeText(text).then(()=>{btn.textContent='✓ Copied!';btn.classList.add('copied');setTimeout(()=>{btn.textContent='Copy';btn.classList.remove('copied');},2000);}).catch(fallback);}else{fallback();}}
function setStatus(msg,isError=false){const el=document.getElementById('status');el.textContent=msg;el.className='status visible'+(isError?' error':' pulsing');}
function clearStatus(){document.getElementById('status').className='status';}
function showModel(msg){const el=document.getElementById('active-model');el.textContent=msg;el.style.display='block';}
function escapeHTML(str){return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function fetchWithTimeout(url,options,ms){
  return Promise.race([fetch(url,options),new Promise((_,reject)=>setTimeout(()=>reject(new Error('Request timed out — please try again')),ms))]);
}

async function aiCall(prompt,temperature=0.7,maxTokens=1200){
  const groqKey=getKey('groq');
  const geminiKey=getKey('gemini');
  if(groqKey){
    try{
      const res=await fetchWithTimeout(GROQ_URL,{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${groqKey}`},body:JSON.stringify({model:GROQ_MODEL,messages:[{role:'user',content:prompt}],max_tokens:maxTokens,temperature,top_p:0.9})},TIMEOUT_MS);
      if(res.ok){const data=await res.json();showModel('✦ Using Groq');return data.choices[0].message.content.trim();}
      const err=await res.json();
      const isRate=err?.error?.message?.toLowerCase().includes('rate limit')||String(res.status).startsWith('429');
      if(!isRate)throw new Error(err?.error?.message||`Groq error ${res.status}`);
      showModel('⚡ Groq limit — switching to Gemini');
    }catch(e){
      if(!e.message.toLowerCase().includes('rate limit')&&!e.message.includes('429')){if(!geminiKey)throw e;}
    }
  }
  if(geminiKey){
    let attempts=0;
    while(attempts<3){
      try{
        const res=await fetchWithTimeout(`https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${geminiKey}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{temperature,maxOutputTokens:maxTokens}})},TIMEOUT_MS);
        if(res.ok){
          const data=await res.json();
          const candidate=data.candidates?.[0];
          let text=candidate?.content?.parts?.[0]?.text||candidate?.output||'';
          if(!text)throw new Error('Empty response from Gemini');
          text=text.replace(/\*\*[\s\S]*?\*\*/g,'').replace(/\*[^*]+\*/g,'').replace(/_{1,2}[^_]+_{1,2}/g,'').replace(/^\s*---+\s*$/gm,'').replace(/\n{3,}/g,'\n\n').trim();
          showModel('✦ Using Gemini');
          return text;
        }
        const err=await res.json();
        const isOverload=err?.error?.message?.toLowerCase().includes('overload')||err?.error?.message?.toLowerCase().includes('high demand')||res.status===503;
        if(isOverload&&attempts<2){attempts++;showModel(`⚡ Gemini busy — retrying (${attempts}/3)...`);await new Promise(r=>setTimeout(r,5000));continue;}
        throw new Error(err?.error?.message||`Gemini error ${res.status}`);
      }catch(e){
        const isOverload=e.message.toLowerCase().includes('overload')||e.message.toLowerCase().includes('high demand');
        if(isOverload&&attempts<2){attempts++;await new Promise(r=>setTimeout(r,5000));continue;}
        throw e;
      }
    }
    throw new Error('Gemini is experiencing high demand — please try again in a few minutes');
  }
  throw new Error('No API key — add your Groq or Gemini key above');
}

function buildGradePrompt(lyrics,genre,context,iteration){
  const iterNote=iteration>0?`\nThis is revision #${iteration}. Be harder than last time. Only raise the score if the song is genuinely more specific and narrative than before.\n`:'';
  return `You are a world class song producer chasing a 10. Be brutally honest.

GENRE: ${genre}
${context?`CONTEXT: ${context}`:''}
${iterNote}
LYRICS:
${lyrics}

Respond in this exact format:

SCORE: [X/10]
ONE LINE REASON: [brutal honesty]

STORY: [One sentence: causal story or mood board?]

STRONGEST 3 LINES:
1. "[exact quote]" — [why it works]
2. "[exact quote]" — [why it works]
3. "[exact quote]" — [why it works]

WEAKEST 3 LINES:
1. "[exact quote]" — [why it fails] — REWRITE: [specific replacement]
2. "[exact quote]" — [why it fails] — REWRITE: [specific replacement]
3. "[exact quote]" — [why it fails] — REWRITE: [specific replacement]

CHORUS VERDICT: [Specific or generic? If generic — write what it should be.]

CRAFT OPPORTUNITIES:
- SENSORY DETAIL: [What's missing? Give an example line.]
- HOOK: [What line should be the hook? Rewrite it.]
- ESCALATION: [Where does it repeat instead of escalate? What should it become?]
- CHARACTER: [Is there a named character? If not — suggest 3 specific fictional options with name + one detail each.]
- SPECIFICITY: [Most generic image? Replace it.]

FINGERPRINT SCORE: [X/total lines irreplaceable. One sentence on what that means.]

PATH TO 10:
1. [Exact weak line → exact replacement → why it's better]
2. [Exact weak line → exact replacement → why it's better]
3. [Exact weak line → exact replacement → why it's better]
4. [Exact weak line → exact replacement → why it's better]
5. [Structural or narrative change needed]`;
}

function buildOptionsPrompt(lyrics,grade,genre){
  return `You are helping a songwriter break past a 7.5. Based on the grade below, generate targeted multiple choice options to unlock the next level of specificity.

GENRE: ${genre}

LYRICS:
${lyrics}

GRADE:
${grade}

Generate exactly 3 questions with exactly 3 options each. Make every option specific, vivid, and different from the others. No generic options. Base them directly on what the grade flagged as missing.

Return ONLY valid JSON in this exact format, nothing else:
{
  "questions": [
    {
      "id": "character",
      "question": "Who is the main character?",
      "options": [
        "Ray, 54, been on the same press for 19 years — his son just got hired at the same plant the week before layoffs were announced",
        "Donna, night shift supervisor, single mom — she's the one who has to post the layoff list on the break room door",
        "Marcus, 23, youngest on the floor — first in his family not to go to college, took the job to prove something"
      ]
    },
    {
      "id": "moment",
      "question": "What is the single most specific moment in this song?",
      "options": [
        "The morning the new automated arm gets bolted in next to his station — it does his job in 8 seconds flat",
        "The night shift meeting where the foreman won't make eye contact with anyone",
        "3am, the plant floor empty except for the machines running on their own, humming like nothing happened"
      ]
    },
    {
      "id": "ending",
      "question": "How does it end for them?",
      "options": [
        "He clocks out for the last time, sits in his truck in the parking lot for 45 minutes, doesn't go home",
        "She takes the severance check, drives to the plant one last time just to look at it, doesn't get out of the car",
        "He stays — the only one left — now maintaining the machines that replaced everyone he knew"
      ]
    }
  ]
}`;
}

function buildRewriteWithOptionsPrompt(lyrics,grade,genre,options){
  const optionsText=Object.entries(options).map(([k,v])=>`${k.toUpperCase()}: ${v}`).join('\n');
  return `You are a world class songwriter. Rewrite this song using the specific details provided. These details are the raw material that will push it past 7.5. Use them concretely — not as themes, as actual scenes and moments in the lyrics.

GENRE: ${genre}

SPECIFIC DETAILS TO BUILD FROM:
${optionsText}

CURRENT LYRICS:
${lyrics}

EDITORIAL FEEDBACK:
${grade}

MANDATORY RULES:
1. The character detail must appear in the song — use their name and specific situation
2. The moment must be the anchor of Verse 1 or Verse 2 — describe it specifically
3. The ending must be the Bridge or Outro — use the exact action described
4. Apply every fix from PATH TO 10
5. Apply every WEAKEST LINE rewrite
6. Keep every STRONGEST LINE untouched
7. Add the missing SENSORY DETAIL from CRAFT OPPORTUNITIES
8. Fix the ESCALATION — pre-chorus 2 must be different from pre-chorus 1
9. Every line must be irreplaceable — specific only to this song
10. No stock clichés, no emotion naming, no identity stacking
11. Keep all section labels: [Verse 1], [Pre-Chorus], [Chorus], etc
12. Output the COMPLETE rewritten song. Every section. Do not truncate.`;
}

function buildSimpleRewritePrompt(lyrics,grade,genre){
  return `You are a world class songwriter. Apply every surgical fix from the feedback to produce a better version.

GENRE: ${genre}

CURRENT LYRICS:
${lyrics}

FEEDBACK:
${grade}

RULES:
- Apply every PATH TO 10 fix — non-negotiable
- Apply every WEAKEST LINE rewrite
- Keep every STRONGEST LINE untouched
- If CHORUS VERDICT suggested a new chorus — use it
- Add the missing SENSORY DETAIL
- Fix the ESCALATION — pre-chorus 2 must escalate beyond pre-chorus 1
- Every line irreplaceable — specific only to this song
- No stock clichés, no emotion naming
- Keep all section labels exactly
- Output the COMPLETE rewritten song. Every section. Do not truncate.`;
}

function parseScore(gradeText){
  const match=gradeText.match(/SCORE:\s*(\d+(?:\.\d+)?)\s*\/\s*10/i);
  return match?parseFloat(match[1]):null;
}
function scoreColor(s){return s>=9?'#34d399':s>=7?'#fbbf24':'#f87171';}
function scoreLabel(s){return s>=9?'🔥 Almost there':s>=8?'✦ Strong — keep pushing':s>=7?'Getting there — push further':'Needs real work';}

function renderGrade(gradeText,score,iteration,prevScore){
  const pct=score?(score/10*100):0;
  const col=score?scoreColor(score):'var(--accent)';
  const delta=prevScore!==null&&score!==null?(score-prevScore):null;
  const deltaHtml=delta!==null?`<span class="score-delta" style="color:${delta>0?'#34d399':delta<0?'#f87171':'var(--muted)'}">${delta>0?'+':''}${delta.toFixed(1)}</span>`:'';
  const iterLabel=iteration>0?`<div class="iteration-badge">✦ Pass ${iteration}</div>`:'';
  return `<div class="output-box grade-box" id="grade-box-${iteration}">
    ${iterLabel}
    <div class="box-header"><div class="box-title">✦ Grade</div><button class="copy-btn" id="copy-grade-${iteration}">Copy</button></div>
    ${score!==null?`<div class="score-display" style="color:${col}">${score}${deltaHtml}<span style="font-size:1.2rem;color:var(--muted)">/10</span></div>
    <div class="score-label">${scoreLabel(score)}</div>
    <div class="score-bar-wrap"><div class="score-bar" style="width:${pct}%"></div></div>`:''}
    <div class="grade-text">${escapeHTML(gradeText)}</div>
  </div>`;
}

function renderOptions(questionsData){
  const needsOptions=state.lastScore!==null&&state.lastScore<8;
  let html=`<div class="options-box" id="options-box">`;
  if(needsOptions){
    html+=`<div class="options-title">✦ Unlock the Next Level</div>
    <div class="options-subtitle">The song is stuck at ${state.lastScore}/10. Pick one option for each question — these specific details will push it past the ceiling.</div>`;
    questionsData.forEach((q,qi)=>{
      html+=`<div class="options-question">
        <div class="options-question-label">${q.question}</div>`;
      q.options.forEach((opt,oi)=>{
        html+=`<button class="option-btn" data-qid="${q.id}" data-idx="${oi}" onclick="selectOption('${q.id}',${oi},this)">${escapeHTML(opt)}</button>`;
      });
      html+=`</div>`;
    });
    html+=`<button class="build-btn" id="build-btn" onclick="rewriteWithOptions()" disabled>✦ &nbsp; Rewrite With These Details</button>`;
  }
  html+=`</div>`;
  html+=`<div class="action-row" style="margin-top:14px">
    <button class="rewrite-btn" id="rewrite-btn" onclick="doSimpleRewrite()">✦ Quick Rewrite</button>
    <button class="regrade-btn" id="regrade-btn" onclick="doRegrade()">↻ Regrade</button>
  </div>
  <div id="action-output"></div>`;
  return html;
}

function selectOption(qid,idx,btn){
  document.querySelectorAll(`[data-qid="${qid}"]`).forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
  const optText=btn.textContent;
  state.selectedOptions[qid]=optText;
  const allQuestions=document.querySelectorAll('.options-question');
  const answered=Object.keys(state.selectedOptions).length;
  if(answered>=allQuestions.length){
    const buildBtn=document.getElementById('build-btn');
    if(buildBtn)buildBtn.disabled=false;
  }
}

async function grade(){
  const lyrics=document.getElementById('lyrics').value.trim();
  const context=document.getElementById('context').value.trim();
  const genre=getSelected('genre-group');
  if(!getKey('groq')&&!getKey('gemini')){setStatus('⚠ Add at least one API key above',true);return;}
  if(!lyrics){setStatus('⚠ Paste some lyrics first',true);return;}
  document.getElementById('grade-btn').disabled=true;
  document.getElementById('output').innerHTML='';
  state={lyrics,grade:'',genre,context,rewritten:'',iteration:0,lastScore:null,selectedOptions:{}};
  setStatus('✦ Grading your lyrics...');
  try{
    const gradeText=await aiCall(buildGradePrompt(lyrics,genre,context,0),0.7,1200);
    const score=parseScore(gradeText);
    state.grade=gradeText;
    state.lastScore=score;
    clearStatus();

    let optionsHtml='';
    if(score!==null&&score<8){
      setStatus('✦ Generating targeted options...');
      try{
        const optionsRaw=await aiCall(buildOptionsPrompt(lyrics,gradeText,genre),0.8,800);
        const cleaned=optionsRaw.replace(/```json|```/g,'').trim();
        const parsed=JSON.parse(cleaned);
        optionsHtml=renderOptions(parsed.questions);
      }catch(e){
        optionsHtml=renderOptions([]);
      }
      clearStatus();
    }else{
      optionsHtml=renderOptions([]);
    }

    document.getElementById('output').innerHTML=renderGrade(gradeText,score,0,null)+optionsHtml;
    document.getElementById(`copy-grade-0`).addEventListener('click',function(){copyText(gradeText,this);});
    document.getElementById('output').scrollIntoView({behavior:'smooth',block:'start'});
  }catch(e){setStatus('⚠ '+e.message,true);}
  document.getElementById('grade-btn').disabled=false;
}

async function rewriteWithOptions(){
  const buildBtn=document.getElementById('build-btn');
  if(buildBtn)buildBtn.disabled=true;
  const out=document.getElementById('action-output');
  out.innerHTML=`<div class="status visible pulsing" style="margin-top:16px">✦ Rewriting with your details...</div>`;
  try{
    const currentLyrics=state.rewritten||state.lyrics;
    const rewritten=await aiCall(buildRewriteWithOptionsPrompt(currentLyrics,state.grade,state.genre,state.selectedOptions),0.95,2000);
    state.rewritten=rewritten;
    out.innerHTML=`<div class="status visible pulsing" style="margin-top:16px">✦ Grading the rewrite...</div>`;
    const newGrade=await aiCall(buildGradePrompt(rewritten,state.genre,state.context,state.iteration+1),0.7,1200);
    const newScore=parseScore(newGrade);
    const prevScore=state.lastScore;
    state.iteration++;
    state.grade=newGrade;
    state.lastScore=newScore;
    state.selectedOptions={};

    let optionsHtml='';
    if(newScore!==null&&newScore<8){
      try{
        const optionsRaw=await aiCall(buildOptionsPrompt(rewritten,newGrade,state.genre),0.8,800);
        const cleaned=optionsRaw.replace(/```json|```/g,'').trim();
        const parsed=JSON.parse(cleaned);
        optionsHtml=renderOptions(parsed.questions);
      }catch(e){optionsHtml=renderOptions([]);}
    }else{
      optionsHtml=renderOptions([]);
    }

    out.innerHTML=
      `<div class="output-box rewrite-box">
        <div class="box-header"><div class="box-title">✦ Rewrite — Pass ${state.iteration}</div><button class="copy-btn" id="copy-rw-${state.iteration}">Copy</button></div>
        <div class="lyrics-text">${escapeHTML(rewritten)}</div>
      </div>`+
      renderGrade(newGrade,newScore,state.iteration,prevScore)+
      optionsHtml;

    document.getElementById(`copy-rw-${state.iteration}`).addEventListener('click',function(){copyText(rewritten,this);});
    out.scrollIntoView({behavior:'smooth',block:'start'});
  }catch(e){out.innerHTML=`<div class="status visible error" style="margin-top:16px">⚠ ${e.message}</div>`;}
}
