<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lyrics Grader</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:          #09080a;
  --surface:     #100f12;
  --surface-2:   #161418;
  --surface-3:   #1c1920;
  --border:      rgba(255,255,255,0.06);
  --border-mid:  rgba(255,255,255,0.10);
  --border-hi:   rgba(255,255,255,0.16);
  --text:        #ede8e1;
  --text-2:      #9b9390;
  --text-3:      #514d4a;
  --gold:        #d4a843;
  --gold-dim:    rgba(212,168,67,0.10);
  --gold-mid:    rgba(212,168,67,0.20);
  --red-soft:    rgba(200,70,70,0.12);
  --red-line:    rgba(200,70,70,0.4);
  --red-text:    #c07878;
  --signal:      #7a9fc2;
  --signal-soft: rgba(122,159,194,0.10);
  --signal-line: rgba(122,159,194,0.4);
  --signal-text: #9ab8d0;
  --green-soft:  rgba(100,180,120,0.10);
  --green-line:  rgba(100,180,120,0.4);
  --green-text:  #88c4a0;
  --radius:      10px;
  --shadow:      0 2px 4px rgba(0,0,0,0.5), 0 12px 32px rgba(0,0,0,0.4);
  --transition:  0.18s cubic-bezier(0.4,0,0.2,1);
}

html { scroll-behavior: smooth; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 15px;
  line-height: 1.65;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  pointer-events: none; z-index: 1000;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.028'/%3E%3C/svg%3E");
}

header {
  padding: 72px 24px 60px;
  text-align: center;
  position: relative;
  border-bottom: 1px solid var(--border);
  overflow: hidden;
}
header::after {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 50% 60% at 50% -10%, rgba(212,168,67,0.09) 0%, transparent 65%),
    radial-gradient(ellipse 80% 40% at 50% 100%, rgba(212,168,67,0.03) 0%, transparent 70%);
  pointer-events: none;
}
.eyebrow {
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem; letter-spacing: 0.22em;
  text-transform: uppercase; color: var(--gold); opacity: 0.7; margin-bottom: 20px;
}
header h1 {
  font-family: 'DM Serif Display', serif;
  font-size: clamp(2.8rem, 7vw, 4.4rem);
  letter-spacing: -0.025em; line-height: 1.0; margin-bottom: 16px;
}
header h1 em { font-style: italic; color: var(--gold); }
header p { color: var(--text-2); font-size: 0.9rem; font-weight: 300; max-width: 440px; margin: 0 auto; }

/* Steps indicator */
.steps-indicator {
  display: flex; align-items: center; justify-content: center; gap: 0;
  margin: 28px auto 0; max-width: 340px;
}
.step-dot {
  display: flex; align-items: center; gap: 0;
  font-family: 'DM Mono', monospace; font-size: 0.6rem; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--text-3);
  transition: color var(--transition);
}
.step-dot.active { color: var(--gold); }
.step-dot.done { color: var(--text-2); }
.step-num {
  width: 22px; height: 22px; border-radius: 50%;
  border: 1px solid currentColor; display: flex; align-items: center; justify-content: center;
  font-size: 0.6rem; margin-right: 6px; transition: background var(--transition), border-color var(--transition);
}
.step-dot.active .step-num { background: var(--gold); border-color: var(--gold); color: #09080a; }
.step-dot.done .step-num { background: var(--surface-3); }
.step-line { width: 32px; height: 1px; background: var(--border); margin: 0 8px; }

main { max-width: 820px; margin: 0 auto; padding: 40px 20px 100px; }

/* Keys panel */
.keys-panel { margin-bottom: 20px; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.keys-panel summary {
  list-style: none; cursor: pointer; user-select: none;
  padding: 13px 18px;
  font-family: 'DM Mono', monospace; font-size: 0.65rem; letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--text-3); display: flex; align-items: center; gap: 8px;
  background: var(--surface); transition: color var(--transition);
}
.keys-panel summary::-webkit-details-marker { display: none; }
.keys-panel summary:hover { color: var(--text-2); }
.keys-panel summary .chevron { margin-left: auto; font-size: 0.7rem; transition: transform 0.2s; }
.keys-panel[open] summary .chevron { transform: rotate(180deg); }
.keys-inner {
  display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
  padding: 20px; background: var(--surface-2); border-top: 1px solid var(--border);
}
@media (max-width: 500px) { .keys-inner { grid-template-columns: 1fr; } }

/* Card */
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; padding: 32px; margin-bottom: 20px; box-shadow: var(--shadow);
}

/* Fields */
.field { margin-bottom: 22px; }
.field:last-of-type { margin-bottom: 0; }

label {
  display: block; font-family: 'DM Mono', monospace;
  font-size: 0.62rem; letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--text-2); margin-bottom: 8px;
}
label .sub { font-family: 'DM Sans', sans-serif; text-transform: none; letter-spacing: 0; font-size: 0.76rem; font-weight: 300; color: var(--text-3); }
label .req { color: var(--gold); margin-left: 2px; }

input[type="text"], input[type="password"], textarea {
  width: 100%; background: var(--surface-2); border: 1px solid var(--border);
  border-radius: 8px; padding: 12px 15px;
  font-family: 'DM Sans', sans-serif; font-size: 0.9rem; color: var(--text);
  outline: none; transition: border-color var(--transition), box-shadow var(--transition); resize: vertical;
}
input:focus, textarea:focus {
  border-color: var(--gold); box-shadow: 0 0 0 3px rgba(212,168,67,0.09);
}
textarea { min-height: 260px; line-height: 1.85; font-size: 0.88rem; }
::placeholder { color: var(--text-3); }

.char-row { display: flex; justify-content: space-between; align-items: center; margin-top: 6px; }
.char-count, .shortcut-hint { font-family: 'DM Mono', monospace; font-size: 0.68rem; color: var(--text-3); }

.retry-row { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
.retry-label { font-family: 'DM Mono', monospace; font-size: 0.62rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-3); }
.retry-select {
  background: var(--surface-2); border: 1px solid var(--border); border-radius: 6px;
  padding: 6px 10px; font-family: 'DM Mono', monospace; font-size: 0.72rem; color: var(--text-2);
  outline: none; cursor: pointer;
}
.retry-select:focus { border-color: var(--gold); }

/* Buttons */
.btn-row { display: flex; gap: 10px; margin-top: 24px; }

.btn-primary {
  flex: 1; padding: 15px 24px; background: var(--gold); color: #09080a;
  border: none; border-radius: 8px;
  font-family: 'DM Serif Display', serif; font-size: 1.05rem;
  cursor: pointer; transition: background var(--transition), transform 0.1s, opacity var(--transition);
  position: relative; overflow: hidden;
}
.btn-primary::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, transparent 50%);
  pointer-events: none;
}
.btn-primary:hover:not(:disabled) { background: #e0b44f; }
.btn-primary:active:not(:disabled) { transform: scale(0.985); }
.btn-primary:disabled { opacity: 0.38; cursor: not-allowed; }

.btn-cancel {
  padding: 15px 18px; background: transparent; border: 1px solid var(--border-mid);
  border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 0.85rem; color: var(--text-2);
  cursor: pointer; display: none; transition: border-color var(--transition), color var(--transition); white-space: nowrap;
}
.btn-cancel:hover { border-color: rgba(200,70,70,0.5); color: #c08080; }
.btn-cancel.visible { display: block; }

/* Status bar */
.status-bar {
  display: none; align-items: center; gap: 14px;
  padding: 14px 18px; background: var(--surface-2);
  border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 20px;
}
.status-bar.active { display: flex; }
.spinner {
  width: 16px; height: 16px;
  border: 1.5px solid var(--border-mid); border-top-color: var(--gold);
  border-radius: 50%; animation: spin 0.8s linear infinite; flex-shrink: 0;
}

// ── Render questions ──
function renderQuestions(gradeResult, questions) {
  const container = $('weakLineBlocks');
  container.innerHTML = '';

  const totalQ = questions.reduce((acc, l) => acc + l.questions.length, 0);
  $('questionsProgress').innerHTML = `<span>${questions.length}</span> weak line${questions.length !== 1 ? 's' : ''} · <span>${totalQ}</span> quick questions`;

  questions.forEach((lineData, li) => {
    const block = document.createElement('div');
    block.className = 'weak-line-block';

    block.innerHTML = `
      <div class="weak-line-num">Weak Line ${li + 1} of ${questions.length}</div>
      <div class="weak-line-text">${esc(lineData.line)}</div>
      <div class="questions-for-line" id="qblock_${li}"></div>`;

    container.appendChild(block);

    const qContainer = block.querySelector(`#qblock_${li}`);
    lineData.questions.forEach((q, qi) => {
      const letters = ['A','B','C','D'];
      const qDiv = document.createElement('div');
      qDiv.className = 'q-block';
      qDiv.innerHTML = `<div class="q-text">${esc(q.text)}</div><div class="q-options" id="opts_${li}_${qi}"></div>`;

      if (qi < lineData.questions.length - 1) {
        const div = document.createElement('hr');
        div.className = 'q-divider';
        qDiv.appendChild(div);
      }

      qContainer.appendChild(qDiv);

      const optsContainer = qDiv.querySelector(`#opts_${li}_${qi}`);
      q.options.forEach((opt, oi) => {
        const label = document.createElement('label');
        label.className = 'q-option';
        label.innerHTML = `
          <input type="radio" name="q_${li}_${qi}" value="${esc(opt)}" />
          <span class="q-letter">${letters[oi]}</span>
          <span class="q-opt-text">${esc(opt)}</span>`;

        label.querySelector('input').addEventListener('change', () => {
          // Deselect siblings
          optsContainer.querySelectorAll('.q-option').forEach(l => l.classList.remove('selected'));
          label.classList.add('selected');
          appState.answers[`${li}_${qi}`] = { question: q.text, chosen: opt };
          checkAllAnswered();
        });

        optsContainer.appendChild(label);
      });
    });
  });
}

function checkAllAnswered() {
  const questions = appState.questions;
  let total = 0, answered = 0;
  questions.forEach((ld, li) => {
    ld.questions.forEach((q, qi) => {
      total++;
      if (appState.answers[`${li}_${qi}`]) answered++;
    });
  });
  $('rewriteBtn').disabled = answered < total;
  if (answered > 0) {
    $('rewriteBtn').textContent = answered < total
      ? `Answer all questions to continue (${answered}/${total})`
      : 'Rewrite to 10/10 →';
  }
}

// ── PASS 3: Rewrite ──
async function startRewrite() {
  const { gradeResult, weakLines, questions, answers, ctx, keys, retries } = appState;

  // Build line directions
  const lineDirections = questions.map((ld, li) => {
    const lineAnswers = ld.questions.map((q, qi) => answers[`${li}_${qi}`]).filter(Boolean);
    return { line: ld.line, answers: lineAnswers };
  });

  clearError();
  controller = new AbortController();
  const { signal } = controller;
  $('rewriteBtn').disabled = true;
  $('rewriteBtn').textContent = 'Rewriting…';
  setStatus('Master rewrite in progress…', 'Pass 3 of 3');
  setStep(3);

  let rewrites;
  try {
    const r = await callAPI(keys, buildRewritePrompt(ctx, lineDirections), signal, retries, 0.82);
    rewrites = parseRewrites(r.text);
  } catch(e) {
    controller = null;
    $('rewriteBtn').disabled = false;
    $('rewriteBtn').textContent = 'Rewrite to 10/10 →';
    setStatus('');
    if (e.name === 'AbortError') return;
    showError(e.message, classify(e.message));
    return;
  }

  controller = null;
  setStatus('');

  renderResults(gradeResult, rewrites, lineDirections);
  showPhase('phaseResults');
}

// ── Render results ──
function renderResults(gradeResult, rewrites, lineDirections) {
  // Grade summary
  $('gradeSummaryTitle').textContent = `Initial Grade · via ${appState.usedModel}`;
  $('gradeSummaryScore').textContent = `${gradeResult.overall}/10`;
  $('gradeSummaryVerdict').textContent = gradeResult.verdict;

  // Primary flags
  const flagsEl = $('primaryFlags');
  if (flagsEl && gradeResult.primary_flags) {
    const f = gradeResult.primary_flags;
    flagsEl.innerHTML = '';
    const flags = [
      { label: 'Show vs Tell', value: f.show_vs_tell },
      { label: 'Interchangeable', value: f.interchangeable },
      { label: 'Repetition', value: f.repetition }
    ];
    flags.forEach(flag => {
      if (!flag.value || flag.value === 'none') return;
      const row = document.createElement('div');
      row.className = 'flag-row';
      row.innerHTML = `<span class="flag-label">${esc(flag.label)}</span><span class="flag-value">"${esc(flag.value)}"</span>`;
      flagsEl.appendChild(row);
    });
    if (flagsEl.children.length === 0) {
      flagsEl.innerHTML = '<div class="flag-row"><span class="flag-value" style="color:var(--green-text)">No major flags — strong across the board.</span></div>';
    }
  }

  // Rewrites
  $('rewriteCountTag').textContent = `${rewrites.length} line${rewrites.length !== 1 ? 's' : ''} rewritten`;

  const rList = $('rewriteResultsList');
  rList.innerHTML = '';

  rewrites.forEach((r, i) => {
    const div = document.createElement('div');
    div.className = 'rewrite-pair';

    // Find choices used for this line
    const lineDirs = lineDirections[i];
    let choicePills = '';
    if (lineDirs && lineDirs.answers.length) {
      const pills = lineDirs.answers.map(a => `<span class="choice-pill">${esc(a.chosen)}</span>`).join('');
      choicePills = `<div class="choices-used">${pills}</div>`;
    }

    div.innerHTML = `
      ${choicePills}
      <div class="line-block line-before"><div class="line-tag">Original</div>${esc(r.before)}</div>
      <div class="line-block line-after"><div class="line-tag">Master Rewrite</div>${esc(r.after)}</div>
      ${r.why ? `<div class="rewrite-why">${esc(r.why)}</div>` : ''}`;

    rList.appendChild(div);
  });

  // Actions
  const aList = $('actionList');
  aList.innerHTML = '';
  gradeResult.actions.forEach(a => {
    const li = document.createElement('li');
    li.textContent = a;
    aList.appendChild(li);
  });

  // Animate score fills (already rendered in grade section, skip if not showing score grid here)
  requestAnimationFrame(() => requestAnimationFrame(() => {
    document.querySelectorAll('.score-fill').forEach(el => { el.style.width = el.dataset.pct + '%'; });
  }));
}

// ── Reset ──
function resetAll() {
  appState = { gradeResult: null, usedModel: null, weakLines: [], questions: [], answers: {} };
  $('lyrics').value = '';
  $('context').value = '';
  $('charCount').textContent = '0 characters';
  $('weakLineBlocks').innerHTML = '';
  $('rewriteResultsList').innerHTML = '';
  $('actionList').innerHTML = '';
  $('rewriteBtn').disabled = true;
  $('rewriteBtn').textContent = 'Rewrite to 10/10 →';
  clearError();
  setStatus('');
  setStep(1);
  showPhase('phaseInput');
}
</script>
