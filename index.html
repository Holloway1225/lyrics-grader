<script>
const GROQ_URL="https://api.groq.com/openai/v1/chat/completions";
const GROQ_MODEL="llama-3.3-70b-versatile";
const GEMINI_MODEL="gemini-2.5-flash-lite";
const TIMEOUT_MS=120000;

// 🔥 FIXED: allow deeper optimization
const MAX_PASSES=12;
const TARGET_SCORE=10;

// plateau still exists but is less punishing
const PLATEAU_THRESHOLD=0.15;
const PLATEAU_PASSES=3;

let cancelled=false;

// ─────────────────────────────
// 🔥 CRITIC FIX — REMOVED HARD CAPS
// ─────────────────────────────
function buildCriticPrompt(lyrics,genre,context,iteration,forceStructural){
  const note=iteration>0
    ? `Revision #${iteration}. Push refinement further. Do NOT be conservative with scoring.`
    : '';

  const structural=forceStructural
    ? `STRUCTURAL MODE: Fix song architecture, not just lines.`
    : '';

  return `You are a MASTER songwriting critic and optimizer.

GENRE: ${genre}
${context?`CONTEXT: ${context}`:''}
${note}
${structural}

SCORING RULES (IMPORTANT):
- Use full 1–10 scale honestly.
- DO NOT cap scores.
- 10 = industry masterpiece / no meaningful improvement possible.
- 9 = exceptional, release-ready.
- 8 = strong professional level.
- 7 = good but improvable.
- 6 and below = clearly flawed.

Evaluate deeply and fairly.

LYRICS:
${lyrics}

Return ONLY JSON:
{
  "score": <number>,
  "dimensions": {
    "specificity": <1-10>,
    "hook_strength": <1-10>,
    "originality": <1-10>,
    "emotional_arc": <1-10>,
    "chorus_memorability": <1-10>
  },
  "story": "<1 sentence>",
  "generic_lines": [],
  "rewrite_targets": [
    {"line":"...","problem":"...","fix_direction":"..."},
    {"line":"...","problem":"...","fix_direction":"..."}
  ],
  "chorus_verdict": "...",
  "hook_test": "...",
  "dynamic_range": "...",
  "path_to_10": "..."
}`;
}

// ─────────────────────────────
// 🔥 WRITER (unchanged but better results now)
// ─────────────────────────────
function buildSurgicalWriterPrompt(lyrics,evaluation,genre,mode){
  return `You are a top-tier songwriter improving lyrics.

MODE: ${mode}

RULES:
- No names
- No clichés
- Every line must feel specific and irreplaceable
- Keep structure intact

CURRENT LYRICS:
${lyrics}

FOCUS:
${evaluation.path_to_10}

Return full rewritten song.`;
}

// ─────────────────────────────
// 🔥 PARSER FIX (safer JSON extraction)
// ─────────────────────────────
function parseEvaluation(raw){
  try{
    const cleaned=raw.replace(/```json|```/g,'').trim();
    const start=cleaned.indexOf('{');
    const end=cleaned.lastIndexOf('}');
    return JSON.parse(cleaned.slice(start,end+1));
  }catch(e){
    return {
      score: 5,
      dimensions: {},
      generic_lines: [],
      rewrite_targets: [],
      path_to_10: "Parsing error fallback"
    };
  }
}

// ─────────────────────────────
// 🔥 CONVERGENCE FIX (REAL 10/10 CAPABLE)
// ─────────────────────────────
function converged(e){
  return e && e.score >= 10;
}

// ─────────────────────────────
// 🔥 LOOP FIX (actually pushes toward 10)
// ─────────────────────────────
async function runLoop(){
  const lyrics=document.getElementById('lyrics').value.trim();
  const genre=getSelected('genre-group');
  const context=document.getElementById('context').value.trim();

  if(!lyrics) return showError("Paste lyrics first");

  cancelled=false;

  let current=lyrics;
  let lastScore=0;
  let plateau=0;

  document.getElementById('output').innerHTML='';

  for(let i=1;i<=MAX_PASSES;i++){
    if(cancelled) break;

    setLoopStatus(`Pass ${i}/${MAX_PASSES}`);

    // evaluate
    const evalRaw=await aiCall(
      buildCriticPrompt(current,genre,context,i,plateau>=PLATEAU_PASSES),
      0.3,
      1200
    );

    const evaluation=parseEvaluation(evalRaw);

    // display
    appendPassBlock(i,evaluation,current,lastScore,null);

    if(converged(evaluation)){
      appendFinalBanner(evaluation.score,false);
      return;
    }

    // plateau logic
    if(Math.abs((evaluation.score||0)-lastScore)<PLATEAU_THRESHOLD){
      plateau++;
    }else{
      plateau=0;
    }

    lastScore=evaluation.score||0;

    // rewrite
    current=await aiCall(
      buildSurgicalWriterPrompt(current,evaluation,genre,'elevation'),
      0.9,
      2000
    );
  }

  appendFinalBanner(lastScore,false);
}
</script>
